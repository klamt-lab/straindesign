# This workflow will reformat all python files with yapf

name: CI-test

on:
#  push:
#    branches:
#      - main
  workflow_dispatch:


permissions:
  contents: read

jobs:
  build_and_test:
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.11', '3.12', '3.13']
        package-manager: ['pip','conda']
        exclude:
        # python-libsbml has no conda-forge build for osx-arm64;
        # pip works fine (PyPI has ARM64 wheels since python-libsbml 5.21.0)
        - os: macos-latest
          package-manager: 'conda'
    steps:
      - uses: actions/checkout@v6
      - name: Cache Conda packages
        uses: actions/cache@v5
        with:
          path: |
            ~/conda_pkgs_dir
          key: ${{ runner.os }}-conda-${{ matrix.python-version }}-${{ hashFiles('**/environment.yml') }}
          restore-keys: |
            ${{ runner.os }}-conda-${{ matrix.python-version }}-
            ${{ runner.os }}-conda-
      - name: Cache pip packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Fix Python PATH on macOS
        if: runner.os == 'macOS'
        shell: bash {0}
        run: |
          # macOS runners ship a system Python (e.g. 3.14) under /Library/Frameworks.
          # bash -l sources /etc/profile which puts it first in PATH, overriding
          # setup-python.  Fix: prepend the correct location in .bash_profile.
          echo 'export PATH="${{ env.pythonLocation }}/bin:$PATH"' >> ~/.bash_profile
      - name: Check Python Version
        run: python --version
      - name: Java Setup
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin' # See 'Supported distributions' for available options
          java-version: '21'
      - name: Set JAVA_HOME for mac OS
        if: runner.os == 'macOS'
        run: echo "JAVA_HOME=$(/usr/libexec/java_home)" >> "$GITHUB_ENV"
      - name: Build for PyPI (if pip)
        if: matrix.package-manager == 'pip'
        run: |
          pip install build
          python -m build
      - name: Install package using pip
        if: matrix.package-manager == 'pip'
        run: pip install ./dist/*.whl
      - name: Install gurobi (pip)
        if: matrix.package-manager == 'pip'
        run: |
          pip install gurobipy
      - name: Install cplex (pip)
        if: matrix.package-manager == 'pip' && runner.os != 'macOS' && matrix.python-version != '3.13'
        run: |
          pip install cplex
      - name: Install scip (pip)
        if: matrix.package-manager == 'pip'
        run: |
          pip install pyscipopt
      - name: Install jpype1 (pip)
        if: matrix.package-manager == 'pip'
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install jpype1
          else
            pip install jpype1==1.5.0
          fi
      - name: Install pytest (pip)
        if: matrix.package-manager == 'pip'
        run: |
          pip install pytest pytest-timeout
      - name: Set up Conda Environment with Micromamba
        if: matrix.package-manager == 'conda'
        uses: mamba-org/setup-micromamba@v2
        with:
          environment-name: straindesign
          micromamba-version: latest
          create-args: >-
            python=${{ matrix.python-version }}
          post-cleanup: 'none'
      - name: Activate Micromamba environment
        if: matrix.package-manager == 'conda'
        run: |
          micromamba activate straindesign
      - name: Build for Conda (if conda)
        if: matrix.package-manager == 'conda'
        run: |
          micromamba install anaconda-client conda-build
          conda build conda-recipe/. -c conda-forge --croot ~/conda-bld --output-folder ./build
      - name: Install package using conda
        if: matrix.package-manager == 'conda'
        run: |
          conda install straindesign -c ./build -c conda-forge
      - name: Install gurobi (conda)
        if: matrix.package-manager == 'conda'
        run: |
          micromamba install -c gurobi gurobi
      - name: Install cplex (conda)
        if: matrix.package-manager == 'conda' && matrix.python-version != '3.13'
        run: |
          pip install cplex
      - name: Install scip (conda)
        if: matrix.package-manager == 'conda'
        run: |
          micromamba install -c conda-forge pyscipopt scip
      - name: Install jpype1 (conda)
        if: matrix.package-manager == 'conda'
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            pip install jpype1
          else
            pip install jpype1==1.5.0
          fi
      - name: Install pytest (conda)
        if: matrix.package-manager == 'conda'
        run: |
          micromamba install pytest pytest-timeout
      - name: Test with pytest
        run: pytest tests -v --medium --log-cli-level=INFO
